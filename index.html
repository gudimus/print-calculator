<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Калькулятор печати</title>

<style>
body{font-family:Arial;padding:12px;max-width:480px;margin:auto}
.card{background:#f5f5f5;padding:15px;border-radius:12px;margin-bottom:12px}
input,select,button{width:100%;padding:10px;margin-top:8px}
.tabs{display:flex;gap:6px;margin-bottom:10px}
.tab{flex:1;padding:10px;background:#eee;text-align:center;cursor:pointer}
.tab.active{background:#000;color:#fff}
.service{display:inline-block;padding:6px 10px;border:1px solid #ccc;border-radius:20px;margin:4px;cursor:pointer}
.service.active{background:#000;color:#fff}
.cart-item{background:#fff;padding:10px;margin-top:6px;border-radius:8px}
</style>
</head>

<body>

<h2>Калькулятор</h2>

<div class="tabs">
<div class="tab active" onclick="switchTab('wf', this)">ШФ</div>
<div class="tab" onclick="switchTab('uv', this)">УФ</div>
</div>

<div id="wf" class="card tab-content">
<input id="wf_w" type="number" value="1000">
<input id="wf_h" type="number" value="1000">
<input id="wf_q" type="number" value="1">

<select id="wf_mat">
<option value="620">Баннер 620</option>
<option value="740">Пленка 740</option>
</select>

<div id="wf_serv">
<span class="service" data="50" type="percent">+50%</span>
<span class="service" data="150" type="sqm">Лам</span>
</div>

<div id="wf_sum">0 ₽</div>
<button onclick="add('wf')">Добавить</button>
</div>

<div id="uv" class="card tab-content" style="display:none">
<input id="uv_w" type="number" value="400">
<input id="uv_h" type="number" value="600">
<input id="uv_q" type="number" value="1">

<select id="uv_mat">
<option value="3600">ПВХ 3мм</option>
<option value="5800">ПВХ 5мм</option>
</select>

<div id="uv_serv">
<span class="service" data="600">Белый</span>
<span class="service" data="400">Лак</span>
</div>

<div id="uv_sum">0 ₽</div>
<button onclick="add('uv')">Добавить</button>
</div>

<div class="card">
<div id="cart"></div>
<h3 id="total">0 ₽</h3>
</div>

<div class="card">
<input id="name" placeholder="Имя">
<input id="phone" placeholder="+7">
<button onclick="send()">Отправить</button>
</div>

<script>

// MAX INIT
const tg = window.Telegram?.WebApp;
if (tg) {
    tg.ready();
    tg.expand();
}

// STATE
let cart = [];

// TAB
function switchTab(tab, el){
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c=>c.style.display='none');
    el.classList.add('active');
    document.getElementById(tab).style.display='block';
}

// SERVICES TOGGLE
document.querySelectorAll('.service').forEach(s=>{
    s.onclick = ()=>s.classList.toggle('active');
});

// CALC
function calc(type){
    let w = +document.getElementById(type+'_w').value;
    let h = +document.getElementById(type+'_h').value;
    let q = +document.getElementById(type+'_q').value;
    let price = +document.getElementById(type+'_mat').value;

    let area = w*h/1000000;
    let total = area*price*q;

    document.querySelectorAll('#'+type+'_serv .active').forEach(s=>{
        let val = +s.getAttribute('data');

        if(type==='wf'){
            if(s.getAttribute('type')==='percent') total+=total*val/100;
            else total+=val*area*q;
        } else {
            total+=val*q;
        }
    });

    if(type==='uv' && total<800) total=800;

    document.getElementById(type+'_sum').innerText=Math.round(total)+' ₽';
    return total;
}

// AUTO CALC
['wf','uv'].forEach(t=>{
    document.querySelectorAll('#'+t+' input, #'+t+' select').forEach(el=>{
        el.oninput=()=>calc(t);
    });
});

// ADD
function add(type){
    let sum = calc(type);

    cart.push({
        type:type,
        size:document.getElementById(type+'_w').value+'x'+document.getElementById(type+'_h').value,
        qty:document.getElementById(type+'_q').value,
        mat:document.getElementById(type+'_mat').selectedOptions[0].text,
        sum:sum
    });

    render();
}

// RENDER
function render(){
    let html='',total=0;

    cart.forEach((i,idx)=>{
        total+=i.sum;
        html+=`<div class="cart-item">
        ${i.type} | ${i.size} | ${i.qty}шт<br>
        ${i.mat} — ${Math.round(i.sum)} ₽
        </div>`;
    });

    if(total>=50000) total*=0.9;

    document.getElementById('cart').innerHTML=html;
    document.getElementById('total').innerText=Math.round(total)+' ₽';
}

// SEND
function send(){
    let name=document.getElementById('name').value;
    let phone=document.getElementById('phone').value;

    if(!name||!phone||!cart.length){
        alert('Заполни все');
        return;
    }

    let total=0;
    let text=`ЗАКАЗ\n\n${name}\n${phone}\n\n`;

    cart.forEach((i,idx)=>{
        total+=i.sum;
        text+=`${idx+1}) ${i.type}
${i.size}
${i.qty} шт
${i.mat}
${Math.round(i.sum)} ₽

`;
    });

    if(total>=50000) total*=0.9;

    text+=`ИТОГО: ${Math.round(total)} ₽`;

    if(tg){
        tg.sendData(text);
    } else {
        alert(text);
    }
}

calc('wf');
calc('uv');

</script>

</body>
</html>
